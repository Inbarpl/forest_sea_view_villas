<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You · Forest Sea View Villas</title>
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { font-family:'Jost',sans-serif; background:#e2dcc0; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:2rem; }
  .box { background:#f5f0e8; padding:4rem 3rem; text-align:center; max-width:500px; border:1px solid #c8b896; }

  




/* ═══════════════════════════════════════════════
   MOBILE RESPONSIVE — complete override
   ═══════════════════════════════════════════════ */

.nav-hamburger {
  display: none;
  flex-direction: column;
  gap: 5px;
  cursor: pointer;
  padding: 0.5rem;
  background: none;
  border: none;
  margin-left: auto;
}
.nav-hamburger span {
  display: block;
  width: 26px;
  height: 2px;
  background: #e8d9c0;
  transition: all 0.3s;
}

@media (max-width: 768px) {

  /* ── Nav ── */
  nav {
    padding: 1rem 1.2rem !important;
    position: sticky !important;
    top: 0 !important;
    z-index: 1000 !important;
    flex-wrap: wrap !important;
  }
  .nav-hamburger { display: flex !important; }
  .nav-links {
    display: none !important;
    flex-direction: column !important;
    width: 100% !important;
    background: rgba(44,36,22,0.97) !important;
    margin-top: 0.5rem !important;
    gap: 0 !important;
    list-style: none !important;
  }
  .nav-links.open { display: flex !important; }
  .nav-links li a {
    display: block !important;
    padding: 0.9rem 1.5rem !important;
    font-size: 0.9rem !important;
    letter-spacing: 0.15em !important;
    border-bottom: 1px solid rgba(255,255,255,0.06) !important;
  }

  /* ── Book direct bar ── */
  .book-direct-bar {
    flex-direction: column !important;
    gap: 0.7rem !important;
    padding: 0.8rem 1rem !important;
    text-align: center !important;
  }

  /* ── General padding ── */
  body { overflow-x: hidden !important; }
  * { box-sizing: border-box !important; }

  /* ── Home: intro 2-col → 1-col ── */
  .quicklinks-grid,
  div[style*="grid-template-columns:repeat(2"],
  div[style*="grid-template-columns: repeat(2"],
  div[style*="grid-template-columns:repeat(3"],
  div[style*="grid-template-columns: repeat(3"],
  div[style*="grid-template-columns:280px"],
  div[style*="grid-template-columns: 280px"],
  div[style*="grid-template-columns:1fr 1fr"],
  div[style*="grid-template-columns: 1fr 1fr"],
  div[style*="grid-template-columns:400px"],
  div[style*="grid-template-columns: 400px"] {
    display: flex !important;
    flex-direction: column !important;
    width: 100% !important;
  }

  /* ── Fix images inside stacked layouts ── */
  div[style*="grid-template-columns:280px"] > div:first-child,
  div[style*="grid-template-columns: 280px"] > div:first-child {
    width: 100% !important;
    min-width: 100% !important;
  }

  /* ── Fix all text containers that get squished ── */
  div[style*="padding:2rem"] {
    padding: 1.5rem 1.2rem !important;
    width: 100% !important;
  }
  div[style*="padding: 2rem"] {
    padding: 1.5rem 1.2rem !important;
    width: 100% !important;
  }

  /* ── Gallery: 2 columns ── */
  .gallery-grid,
  div[style*="grid-template-columns:repeat(4,1fr)"],
  div[style*="grid-template-columns: repeat(4,1fr)"] {
    display: grid !important;
    grid-template-columns: repeat(2, 1fr) !important;
  }

  /* ── Section max-widths ── */
  div[style*="max-width:1100px"],
  div[style*="max-width: 1100px"],
  div[style*="max-width:900px"],
  div[style*="max-width: 900px"],
  div[style*="max-width:1200px"],
  div[style*="max-width: 1200px"] {
    padding-left: 1rem !important;
    padding-right: 1rem !important;
    width: 100% !important;
  }

  /* ── Hero section ── */
  div[style*="min-height:70vh"],
  div[style*="min-height: 70vh"] {
    min-height: 60vh !important;
    padding: 2rem 1.2rem !important;
  }

  /* ── Rates cards ── */
  div[style*="border:1px solid var(--stone);padding:2.5rem"] {
    padding: 2rem 1.2rem !important;
  }

  /* ── Contact form ── */
  div[style*="gap:1rem;display:grid"] {
    display: flex !important;
    flex-direction: column !important;
  }

  /* ── Footer ── */
  footer div[style*="grid-template-columns"],
  footer div[style*="display:flex"][style*="justify-content:space-between"] {
    flex-direction: column !important;
    gap: 0.5rem !important;
  }
}

</style>
</head>
<body>
<div class="box">
  <div style="font-size:2rem;margin-bottom:1rem;">✦</div>
  <h1 style="font-family:'Yeseva One',serif;color:#5c4a32;margin-bottom:1rem;">Thank You!</h1>
  <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:#8b7355;margin-bottom:2rem;">Your enquiry has been sent. We'll be in touch within 24 hours.</p>
  <a href="index.html" style="display:inline-block;padding:0.8rem 2rem;background:linear-gradient(90deg,#2a4a2e,#2a8a96);color:#f5f0e8;text-decoration:none;font-size:0.82rem;letter-spacing:0.2em;text-transform:uppercase;">← Back to Home</a>
</div>

<script>
(function(){
  var toggle = document.getElementById('navToggle');
  var nav = document.querySelector('.nav-links');
  if(toggle && nav){
    toggle.addEventListener('click', function(){
      nav.classList.toggle('open');
    });
    nav.querySelectorAll('a').forEach(function(a){
      a.addEventListener('click', function(){ nav.classList.remove('open'); });
    });
  }
})();
</script>
</body>
</html>
