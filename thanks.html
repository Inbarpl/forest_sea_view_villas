<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Thank You · Forest Sea View Villas</title>
<link href="https://fonts.googleapis.com/css2?family=Yeseva+One&family=Cormorant+Garamond:ital,wght@0,300;0,400;1,300&family=Jost:wght@300;400;500&display=swap" rel="stylesheet">
<style>
  body { font-family:'Jost',sans-serif; background:#e2dcc0; display:flex; align-items:center; justify-content:center; min-height:100vh; margin:0; padding:2rem; }
  .box { background:#f5f0e8; padding:4rem 3rem; text-align:center; max-width:500px; border:1px solid #c8b896; }

  .nav-hamburger {
    display: none;
    flex-direction: column;
    gap: 5px;
    cursor: pointer;
    padding: 0.5rem;
    background: none;
    border: none;
  }
  .nav-hamburger span {
    display: block;
    width: 24px;
    height: 2px;
    background: var(--parchment);
    transition: all 0.3s;
  }

/* ── MOBILE RESPONSIVE ─────────────────────────────────────── */
@media (max-width: 768px) {

  /* Nav */
  .nav-inner { padding: 0 1rem; }
  .nav-logo { font-size: 1rem; }
  .nav-links { display: none; flex-direction: column; position: absolute;
    top: 100%; left: 0; right: 0; background: var(--deep);
    padding: 1rem 0; z-index: 999; gap: 0; }
  .nav-links.open { display: flex; }
  .nav-links li a { display: block; padding: 0.8rem 2rem;
    font-size: 0.85rem; border-bottom: 1px solid rgba(255,255,255,0.05); }
  .nav-hamburger { display: flex !important; }

  /* Book direct bar */
  .book-direct-bar { flex-direction: column; gap: 0.8rem; padding: 0.8rem 1rem; text-align: center; }
  .book-direct-bar p { font-size: 0.88rem; }

  /* Hero text */
  .hero-title { font-size: 3rem !important; }
  .hero-sub { font-size: 0.7rem !important; letter-spacing: 0.15em !important; }

  /* General section padding */
  section, .section { padding: 3rem 1.2rem !important; }

  /* Explore cards - stack to single column */
  .explore-grid { grid-template-columns: 1fr !important; }
  .explore-card-inner { grid-template-columns: 1fr !important; }
  .explore-card-inner > div:first-child { height: 220px !important; }

  /* Villas grid */
  .villas-grid { grid-template-columns: 1fr !important; }

  /* Gallery - 2 columns on mobile */
  .gallery-grid { grid-template-columns: repeat(2,1fr) !important; }

  /* Rates cards */
  .rates-grid { grid-template-columns: 1fr !important; }

  /* Contact form */
  .contact-grid { grid-template-columns: 1fr !important; }
  .dates-row { grid-template-columns: 1fr !important; }

  /* Info page */
  .info-grid { grid-template-columns: 1fr !important; }
}

@media (max-width: 480px) {
  .gallery-grid { grid-template-columns: repeat(2,1fr) !important; }
  .hero-title { font-size: 2.4rem !important; }
}

</style>
</head>
<body>
<div class="box">
  <div style="font-size:2rem;margin-bottom:1rem;">✦</div>
  <h1 style="font-family:'Yeseva One',serif;color:#5c4a32;margin-bottom:1rem;">Thank You!</h1>
  <p style="font-family:'Cormorant Garamond',serif;font-style:italic;font-size:1.1rem;color:#8b7355;margin-bottom:2rem;">Your enquiry has been sent. We'll be in touch within 24 hours.</p>
  <a href="index.html" style="display:inline-block;padding:0.8rem 2rem;background:linear-gradient(90deg,#2a4a2e,#2a8a96);color:#f5f0e8;text-decoration:none;font-size:0.82rem;letter-spacing:0.2em;text-transform:uppercase;">← Back to Home</a>
</div>

<script>
const toggle = document.getElementById('navToggle');
const navLinks = document.querySelector('.nav-links');
if (toggle && navLinks) {
  toggle.addEventListener('click', () => {
    navLinks.classList.toggle('open');
  });
  // Close menu when a link is clicked
  navLinks.querySelectorAll('a').forEach(a => {
    a.addEventListener('click', () => navLinks.classList.remove('open'));
  });
}
</script>

</body>
</html>
